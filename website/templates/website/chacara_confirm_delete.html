{% extends "website/modelo.html" %}

{% block title %}Excluir Chácara — Chácara Aluguel{% endblock %}

{% block main %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger border-0 shadow-sm">
      <div class="card-header bg-danger text-white py-3">
        <h4 class="mb-0 fw-display"><i class="bi bi-trash me-2"></i>Excluir Chácara</h4>
      </div>
      <div class="card-body p-4">
        <p class="mb-3">Tem certeza que deseja excluir a chácara <strong>{{ object.nome }}</strong>?</p>
        <p class="text-danger small">Esta ação não pode ser desfeita.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-trash me-1"></i>Confirmar Exclusão
            </button>
            <a href="{% url 'chacara_list' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
